---
- name: Install Emacs 30.1
  hosts: localhost
  tasks:
    - name: Update apt cache (ignore GPG warnings)
      become: yes
      apt:
        update_cache: yes
      ignore_errors: yes

    - name: Ensure required dependencies are installed
      become: yes
      apt:
        name:
          - libwebp-dev
          - xaw3dg
          - libxpm4
          - libpng16-16
          - zlib1g
          - libjpeg8
          - libtiff-dev
          - libgif7
          - libgif-dev
          - texinfo
          - libgnutls28-dev
          - libncurses-dev
          - librsvg2-2
          - librsvg2-dev
          - libsqlite3-dev
          - liblcms2-dev
          - imagemagick
          - libmagickwand-dev
          - pkg-config
          - libxaw7-dev
          - libgpm-dev
          - libm17n-dev
          - libotf-dev
          - libxft-dev
          - libsystemd-dev
          - libjansson-dev
          - libgtk-3-dev
          - libwebkit2gtk-4.1-dev
          - libacl1-dev
        state: present
        update_cache: no
    - name: Check if libtree-sitter 0.20+ is installed
      stat:
        path: /usr/local/lib/libtree-sitter.so
      register: treesitter_installed

    - name: Download tree-sitter 0.20.8 source
      become: yes
      get_url:
        url: https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v0.20.8.tar.gz
        dest: /tmp/tree-sitter-0.20.8.tar.gz
      when: not treesitter_installed.stat.exists

    - name: Extract tree-sitter source
      become: yes
      ansible.builtin.unarchive:
        src: /tmp/tree-sitter-0.20.8.tar.gz
        dest: /tmp
        remote_src: yes
      when: not treesitter_installed.stat.exists

    - name: Build and install tree-sitter
      become: yes
      shell: make && make install PREFIX=/usr/local
      args:
        chdir: /tmp/tree-sitter-0.20.8
      when: not treesitter_installed.stat.exists

    - name: Update ldconfig for tree-sitter
      become: yes
      shell: ldconfig
      when: not treesitter_installed.stat.exists
    - name: Check if Emacs 30 binary is already installed
      stat:
        path: /usr/local/bin/emacs-30.1
      register: emacs_installed

    - name: Download Emacs 30.1 source archive
      become: yes
      get_url:
        url: https://mirrors.ocf.berkeley.edu/gnu/emacs/emacs-30.1.tar.xz
        dest: /tmp/emacs-30.1.tar.xz
        mode: '0644'
      when: not emacs_installed.stat.exists

    - name: Extract Emacs 30.1 source archive
      become: yes
      ansible.builtin.unarchive:
        src: /tmp/emacs-30.1.tar.xz
        dest: /tmp
        remote_src: yes
      args:
        creates: /tmp/emacs-30.1
      when: not emacs_installed.stat.exists

    - name: Configure Emacs build
      become: yes
      shell: ./configure --prefix=/usr/local --with-imagemagick
      args:
        chdir: /tmp/emacs-30.1
        creates: /tmp/emacs-30.1/Makefile
      when: not emacs_installed.stat.exists

    - name: Build Emacs
      become: yes
      shell: make
      args:
        chdir: /tmp/emacs-30.1
        creates: /tmp/emacs-30.1/src/emacs
      when: not emacs_installed.stat.exists

    - name: Install Emacs
      become: yes
      shell: make install
      args:
        chdir: /tmp/emacs-30.1
        creates: /usr/local/bin/emacs-30.1
      when: not emacs_installed.stat.exists

    - name: Verify Emacs installation
      command: /usr/local/bin/emacs --version
      register: emacs_version
      changed_when: false

    - name: Display installed Emacs version
      debug:
        msg: "Installed Emacs version: {{ emacs_version.stdout }}"
    - name: Configure emacsclient as default for text files
      block:

        - name: Ensure ~/.local/bin exists
          file:
            path: "{{ user_home | default('~') }}/.local/bin"
            state: directory
            mode: '0755'

        - name: Create emacsclient-disown wrapper script
          copy:
            dest: "{{ user_home | default('~') }}/.local/bin/emacsclient-disown"
            mode: '0755'
            content: |
              #!/bin/bash
              EMACS_SOCKET_NAME="$HOME/.emacs.d/server/server" setsid /usr/local/bin/emacsclient -c "$@" & disown

        - name: Create local applications directory
          file:
            path: "{{ user_home | default('~') }}/.local/share/applications"
            state: directory
            mode: '0755'

        - name: Create emacsclient desktop entry
          copy:
            dest: "{{ user_home | default('~') }}/.local/share/applications/emacsclient.desktop"
            mode: '0644'
            content: |
              [Desktop Entry]
              Name=Emacs Client
              GenericName=Text Editor
              Comment=Edit text files with emacsclient
              MimeType=text/plain;text/yaml;application/x-yaml;text/x-chdr;text/x-csrc;text/x-c++hdr;text/x-c++src;text/x-java;text/x-dsrc;text/x-pascal;text/x-perl;text/x-python;application/x-php;application/x-httpd-php3;application/x-httpd-php4;application/x-httpd-php5;application/xml;application/javascript;application/x-shellscript;text/x-scheme;
              Exec=/home/jeszyman/.local/bin/emacsclient-disown %f
              Icon=emacs
              Type=Application
              Terminal=false
              Categories=Development;TextEditor;
              StartupWMClass=Emacs
              Keywords=Text;Editor;

        - name: Create custom MIME types file
          copy:
            dest: "{{ user_home | default('~') }}/.mime.types"
            content: |
              text/plain    block
            mode: '0644'

        - name: Add MIME_TYPES_USER to bashrc
          lineinfile:
            path: "{{ user_home | default('~') }}/.bashrc"
            line: 'export MIME_TYPES_USER=~/.mime.types'
            state: present

        - name: Create local mime directory
          file:
            path: "{{ user_home | default('~') }}/.local/share/mime"
            state: directory
            mode: '0755'

        - name: Ensure MIME packages directory exists
          file:
            path: "{{ user_home | default('~') }}/.local/share/mime/packages"
            state: directory
            mode: '0755'

        - name: Set emacsclient as default for text files
          shell: |
            xdg-mime default emacsclient.desktop text/plain
            xdg-mime default emacsclient.desktop text/yaml
            xdg-mime default emacsclient.desktop application/x-yaml
            xdg-mime default emacsclient.desktop text/x-python
            xdg-mime default emacsclient.desktop text/x-shellscript
            xdg-mime default emacsclient.desktop application/xml
            xdg-mime default emacsclient.desktop application/javascript
          args:
            executable: /bin/bash

        - name: Update MIME database
          shell: update-mime-database ~/.local/share/mime
          args:
            executable: /bin/bash
    - name: Ensure ~/.emacs.d/server exists with correct permissions
      file:
        path: "{{ ansible_env.HOME }}/.emacs.d/server"
        state: directory
        mode: '0700'

    - name: Ensure systemd user unit directory exists
      file:
        path: "{{ ansible_env.HOME }}/.config/systemd/user"
        state: directory
        mode: '0755'

    - name: Install systemd user unit for emacs
      copy:
        dest: "{{ ansible_env.HOME }}/.config/systemd/user/emacs.service"
        mode: '0644'
        content: |
          [Unit]
          Description=Emacs 30.1 text editor daemon
          Documentation=man:emacs(1) info:Emacs
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/emacs --fg-daemon
          ExecStop=/usr/bin/emacsclient --socket-name {{ ansible_env.HOME }}/.emacs.d/server/server --eval "(kill-emacs)"
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=default.target
      notify: Restart emacs daemon

    - name: Enable and start emacs daemon user service
      systemd:
        name: emacs.service
        scope: user
        enabled: yes
        state: started
    - name: Ensure EMACS_SOCKET_NAME is exported in .bashrc
      lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: 'export EMACS_SOCKET_NAME="$HOME/.emacs.d/server/server"'
        state: present
  handlers:
    - name: Restart emacs daemon
      systemd:
        name: emacs.service
        scope: user
        state: restarted
