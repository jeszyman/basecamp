name: test-sync-gitignore

on:
  push:
    paths:
      - scripts/sync-gitignore.sh
      - .github/workflows/test-sync-gitignore.yml
  pull_request:
    paths:
      - scripts/sync-gitignore.sh
      - .github/workflows/test-sync-gitignore.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test --help exits 0
        run: bash scripts/sync-gitignore.sh --help

      - name: Test missing args exits 1
        run: |
          bash scripts/sync-gitignore.sh && exit 1 || true

      - name: Test successful sync
        run: |
          tmpdir=$(mktemp -d)
          bash scripts/sync-gitignore.sh "$tmpdir" \
            "https://raw.githubusercontent.com/jeszyman/basecamp/v1.1.0/git/jeszyman_gitignore"
          [[ -s "$tmpdir/.gitignore" ]] || { echo "FAIL: .gitignore is empty"; exit 1; }
          echo "PASS: .gitignore has content"
          cat "$tmpdir/.gitignore"

      - name: Test deduplication (run twice, no duplicate lines)
        run: |
          tmpdir=$(mktemp -d)
          url="https://raw.githubusercontent.com/jeszyman/basecamp/v1.1.0/git/jeszyman_gitignore"
          bash scripts/sync-gitignore.sh "$tmpdir" "$url"
          bash scripts/sync-gitignore.sh "$tmpdir" "$url"
          dupes=$(grep -v '^#' "$tmpdir/.gitignore" | grep -v '^$' | sort | uniq -d)
          if [[ -n "$dupes" ]]; then
            echo "FAIL: duplicate entries found:"
            echo "$dupes"
            exit 1
          fi
          echo "PASS: no duplicates"
