# ~/.tmux.conf
set -g default-terminal "tmux-256color"             # 256-color terminfo inside panes (vs default 8-color 'screen')
set -as terminal-features ",*:RGB"                  # pass 24-bit truecolor through (themes, syntax highlighting)
set -g mode-keys emacs                              # explicit (already the default here)
set -g mouse on                                     # wheel scrolls into copy mode; drag selects
set -g copy-command 'xclip -selection clipboard -i' # M-w / drag-copy -> X11 clipboard
set -g history-limit 50000                          # deep scrollback

# vterm-parity copy/paste keys
bind-key -T copy-mode C-c send-keys -X copy-pipe-and-cancel                              # C-c = copy + exit (CUA), inside copy mode
bind-key -n C-v run-shell "xclip -o -selection clipboard | tmux load-buffer - ; tmux paste-buffer"  # C-v = paste system clipboard into pane
